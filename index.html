<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Memento · Mazos</title>
  <style>
    :root {
      --bg: #0f1216; --surface: #171c24; --surface2: #1e2530; --border: #2a3340;
      --text: #eef2f7; --muted: #9aa6b6; --accent: #3b6fed;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    header { padding: 20px 16px 6px; }
    h1 { margin: 0 0 2px; font-size: 22px; }
    .sub { color: var(--muted); font-size: 13px; }
    .hint { margin: 8px 16px 0; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .hint b { color: var(--text); }
    .controls { padding: 10px 16px 4px; display: flex; flex-direction: column; gap: 10px; position: sticky; top: 0; background: var(--bg); z-index: 5; }
    input[type=search], select {
      width: 100%; padding: 11px 13px; border-radius: 11px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 16px; outline: none;
    }
    input[type=search]:focus, select:focus { border-color: var(--accent); }
    .filters { display: flex; flex-direction: column; gap: 8px; }
    .frow { display: flex; gap: 8px; align-items: center; }
    .flabel { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; min-width: 64px; }
    .chips { display: flex; gap: 7px; flex-wrap: wrap; }
    .chip {
      padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); font-size: 13px; cursor: pointer; user-select: none;
    }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .count { color: var(--muted); font-size: 12px; padding: 6px 16px 0; }
    main { padding: 8px 16px 40px; display: grid; gap: 12px; grid-template-columns: 1fr; }
    @media (min-width: 640px) { main { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1000px) { main { grid-template-columns: 1fr 1fr 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .card h2 { margin: 0; font-size: 17px; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--surface2); color: var(--muted); }
    .desc { color: var(--muted); font-size: 14px; line-height: 1.45; flex: 1; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .info { color: var(--muted); font-size: 12px; }
    a.dl { text-decoration: none; background: var(--accent); color: #fff; font-weight: 600; padding: 10px 16px; border-radius: 10px; font-size: 14px; white-space: nowrap; }
    a.dl:active { opacity: .85; }
    .empty, .error { color: var(--muted); padding: 40px 16px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Memento · Mazos</h1>
    <div class="sub">Descarga un mazo e impórtalo: <b>Ajustes → Datos → Elegir archivo .apkg</b></div>
  </header>
  <div class="hint" id="hint">Cargando…</div>

  <div class="controls">
    <input type="search" id="q" placeholder="Buscar…" autocomplete="off" />
    <div class="filters">
      <div class="frow"><span class="flabel">Categoría</span><div class="chips" id="cats"></div></div>
      <div class="frow"><span class="flabel">Idioma</span><div class="chips" id="langs"></div></div>
      <div class="frow"><span class="flabel">Multimedia</span><div class="chips" id="media"></div></div>
      <div class="frow"><span class="flabel">Orden</span>
        <select id="sort">
          <option value="title">Título (A–Z)</option>
          <option value="cards-desc">Más cartas</option>
          <option value="cards-asc">Menos cartas</option>
          <option value="bytes-desc">Más pesado</option>
          <option value="bytes-asc">Más ligero</option>
        </select>
      </div>
    </div>
  </div>
  <div class="count" id="count"></div>
  <main id="grid"></main>

  <script>
    const fmtBytes = (n) => n < 1024 ? n + ' B' : n < 1048576 ? (n / 1024).toFixed(0) + ' KB' : (n / 1048576).toFixed(1) + ' MB';
    const MEDIA = [['Todas', null], ['Audio', 'audio'], ['Imagen', 'image'], ['Solo texto', 'text']];
    let decks = [], base = 'decks/';
    const f = { q: '', cat: 'Todas', lang: 'Todos', media: null, sort: 'title' };

    const uniq = (xs) => Array.from(new Set(xs));
    function matches(d) {
      if (f.cat !== 'Todas' && d.category !== f.cat) return false;
      if (f.lang !== 'Todos' && (d.language || '—') !== f.lang) return false;
      const m = d.media || [];
      if (f.media === 'audio' && !m.includes('audio')) return false;
      if (f.media === 'image' && !m.includes('image')) return false;
      if (f.media === 'text' && m.length) return false;
      if (f.q) {
        const hay = (d.title + ' ' + d.description + ' ' + (d.tags || []).join(' ')).toLowerCase();
        if (!hay.includes(f.q)) return false;
      }
      return true;
    }
    function sortFn(a, b) {
      switch (f.sort) {
        case 'cards-desc': return (b.cards || 0) - (a.cards || 0);
        case 'cards-asc': return (a.cards || 0) - (b.cards || 0);
        case 'bytes-desc': return (b.bytes || 0) - (a.bytes || 0);
        case 'bytes-asc': return (a.bytes || 0) - (b.bytes || 0);
        default: return a.title.localeCompare(b.title);
      }
    }
    function chipRow(elId, values, current, onPick) {
      const box = document.getElementById(elId);
      box.innerHTML = '';
      for (const [label, val] of values) {
        const el = document.createElement('div');
        el.className = 'chip' + (current === val ? ' active' : '');
        el.textContent = label;
        el.onclick = () => { onPick(val); render(); };
        box.appendChild(el);
      }
    }
    function render() {
      chipRow('cats', ['Todas', ...uniq(decks.map((d) => d.category)).sort()].map((c) => [c, c]), f.cat, (v) => (f.cat = v));
      chipRow('langs', ['Todos', ...uniq(decks.map((d) => d.language || '—')).sort()].map((l) => [l, l]), f.lang, (v) => (f.lang = v));
      chipRow('media', MEDIA, f.media, (v) => (f.media = v));

      const list = decks.filter(matches).sort(sortFn);
      document.getElementById('count').textContent = list.length + (list.length === 1 ? ' mazo' : ' mazos');
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      if (!list.length) { grid.innerHTML = '<div class="empty">Sin resultados.</div>'; return; }
      for (const d of list) {
        const m = d.media || [];
        const mediaBadges = [m.includes('audio') ? '🔊 audio' : '', m.includes('image') ? '🖼 imagen' : '', m.length ? '' : '📝 texto'].filter(Boolean);
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML =
          '<div class="badges"><span class="badge">' + d.category + '</span><span class="badge">' + (d.language || '—') + '</span>' +
          mediaBadges.map((x) => '<span class="badge">' + x + '</span>').join('') + '</div>' +
          '<h2>' + d.title + '</h2>' +
          '<p class="desc">' + d.description + '</p>' +
          '<div class="row"><span class="info">' + (d.cards || 0) + ' cartas · ' + fmtBytes(d.bytes || 0) + '</span>' +
          '<a class="dl" href="' + base + d.file + '" download>Descargar</a></div>';
        grid.appendChild(card);
      }
    }

    document.getElementById('q').addEventListener('input', (e) => { f.q = e.target.value.trim().toLowerCase(); render(); });
    document.getElementById('sort').addEventListener('change', (e) => { f.sort = e.target.value; render(); });

    async function load() {
      for (const b of ['decks/', '../decks/']) {
        try { const r = await fetch(b + 'index.json', { cache: 'no-store' }); if (r.ok) { base = b; return (await r.json()).decks || []; } } catch (e) { /* siguiente */ }
      }
      throw new Error('no manifest');
    }
    load()
      .then((list) => {
        decks = list;
        document.getElementById('hint').innerHTML = '<b>' + decks.length + '</b> mazos. Filtra por categoría, idioma o multimedia, ordena, y toca <b>Descargar</b>.';
        render();
      })
      .catch(() => {
        const h = document.getElementById('hint');
        h.classList.add('error');
        h.textContent = 'No pude cargar la lista de mazos.';
      });
  </script>
</body>
</html>
